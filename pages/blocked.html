<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="blocked.css" />
    <title>몰입 중 - PomoBlock</title>
  </head>
  <body>
    <div class="blocked-container">
      <h1>지금은 몰입이 필요한 시간입니다</h1>
      <p class="message">유혹을 이겨내고 오늘의 목표를 달성해 보세요.</p>

      <div class="timer-box">
        <p>다음 휴식까지 남은 시간</p>
        <div id="remainingTime">--:--</div>
      </div>

      <div class="tips">
        <p>💡 팁: 심호흡을 한 번 하고 다시 작업에 집중해 보세요.</p>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
