<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="options.css" />
    <title>PomoShield 설정</title>
  </head>
  <body>
    <div class="settings-container">
      <h1>PomoShield 설정 ⚙️</h1>

      <section class="config-section">
        <h2>타이머 설정</h2>
        <div class="input-group">
          <label>집중 시간 (분)</label>
          <input type="number" id="focusTime" min="1" max="60" value="25" />
        </div>
        <div class="input-group">
          <label>휴식 시간 (분)</label>
          <input type="number" id="restTime" min="1" max="30" value="5" />
        </div>
        <div class="input-group">
          <label>목표 세트 수</label>
          <input type="number" id="totalSets" min="1" max="10" value="4" />
        </div>
      </section>

      <section class="config-section">
        <h2>차단 사이트 관리</h2>
        <div class="blacklist-input">
          <input type="text" id="newSite" placeholder="예: youtube.com" />
          <button id="addSiteBtn">추가</button>
        </div>
        <ul id="siteList"></ul>
      </section>

      <div class="actions">
        <button id="saveBtn" class="save-btn">설정 저장하기</button>
        <p id="statusMsg"></p>
      </div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
